# GLOBAL TOKENS: Typography Physics
typography:
  family:
    sans: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif'
    mono: 'ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace'
  size:
    body-xs: "0.75rem"
    body-sm: "0.875rem"
    body-base: "1.0625rem"
    heading-sm: "1.125rem"
    heading-md: "1.25rem"
    heading-fluid: "clamp(2rem, 4vw, 2.5rem)"
  weight:
    regular: "400"
    bold: "700"
    extrabold: "800"
  tracking:
    tight-03: "-0.03em"
    tight-02: "-0.02em"
    tight-01: "-0.01em"
    wide-05: "0.05em"
  line-height:
    dense: "1.1"
    prose: "1.5"
