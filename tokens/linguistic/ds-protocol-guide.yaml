title: "POINTSAV LINGUISTIC TOKEN: TYPOGRAPHIC ENFORCEMENT"
metadata:
  status: "ACTIVE"
  scope: "Constitutional SLM Rule for Typographic Parity"
constitutional_rules:
  - directive: "The Bloomberg Typographic Rule"
    accepted_behavior: "Present all proprietary assets and system modules in strict Title Case. Reserve legal trademark declarations exclusively for the standardized Trademark Footer."
    negative_constraint: "Absolutely purge all inline trademark symbols (™, ®) from headings and narrative body text to eliminate typographical friction."
  - directive: "Terminal Egress Formatting"
    accepted_behavior: "Rely purely on standard Markdown hierarchy for document structure. Maintain clean, utilitarian visual egress."
    negative_constraint: "Do not append standard structural Markdown tags like '###' at the bottom of public egress documents."
